<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>{% block title %}RAG Study Buddy{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        :root {
            --bg-dark: #020617;
            --bg-card: #020617;
            --primary: #2563eb;
            --primary-soft: rgba(37,99,235,0.18);
            --accent: #facc15;
            --accent-soft: rgba(250,204,21,0.16);
            --text-main: #e5e7eb;
            --text-muted: #9ca3af;
            --border-subtle: #1f2937;
            --danger: #f97373;
            --radius-lg: 18px;
            --radius-full: 999px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(37,99,235,0.22), transparent 55%),
                radial-gradient(circle at bottom right, rgba(250,204,21,0.22), transparent 55%),
                #020617;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a { color: inherit; text-decoration: none; }

        .navbar {
            position: sticky;
            top: 0;
            z-index: 40;
            backdrop-filter: blur(18px);
            background: linear-gradient(to right, rgba(15,23,42,0.97), rgba(15,23,42,0.88));
            border-bottom: 1px solid rgba(148,163,184,0.25);
        }

        .navbar-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0.7rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-weight: 600;
            font-size: 1.05rem;
        }

        .brand-pill {
            width: 32px;
            height: 32px;
            border-radius: 12px;
            background: radial-gradient(circle at 20% 0%, #facc15, #2563eb 55%, #1d4ed8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: #020617;
        }

        .nav-links {
            display: flex;
            gap: 1.1rem;
            font-size: 0.9rem;
            align-items: center;
        }

        .nav-link {
            padding: 0.35rem 0.9rem;
            border-radius: var(--radius-full);
            color: var(--text-muted);
            border: 1px solid transparent;
            transition: all 0.18s ease;
        }

        .nav-link:hover {
            color: var(--text-main);
            border-color: rgba(148,163,184,0.35);
            background: rgba(15,23,42,0.98);
        }

        .nav-link.active {
            color: #020617;
            background: linear-gradient(135deg, var(--accent), var(--primary));
            box-shadow: 0 0 16px rgba(37,99,235,0.7);
            border-color: transparent;
        }

        .page { flex: 1; }
        .page-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 1.5rem 3rem;
        }

        .card {
            background: radial-gradient(circle at top left, rgba(37,99,235,0.25), rgba(15,23,42,0.98));
            border-radius: var(--radius-lg);
            border: 1px solid rgba(148,163,184,0.35);
            padding: 1.8rem;
            box-shadow: 0 25px 60px rgba(0,0,0,0.85);
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.23rem 0.7rem;
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: var(--primary-soft);
            color: #e0f2fe;
            border: 1px solid rgba(59,130,246,0.9);
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
            padding: 0.7rem 1.25rem;
            border-radius: var(--radius-full);
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            color: #020617;
            background: linear-gradient(135deg, var(--accent), var(--primary));
            box-shadow: 0 15px 35px rgba(37,99,235,0.65);
            transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
            box-shadow: 0 18px 50px rgba(37,99,235,0.85);
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.7rem 1.1rem;
            border-radius: var(--radius-full);
            border: 1px solid rgba(148,163,184,0.55);
            background: rgba(15,23,42,0.98);
            color: var(--text-main);
            cursor: pointer;
            font-size: 0.9rem;
            gap: 0.4rem;
        }

        input[type="text"], textarea, select, input[type="number"], input[type="file"] {
            width: 100%;
            padding: 0.65rem 0.8rem;
            margin-top: 0.35rem;
            border-radius: 0.7rem;
            border: 1px solid var(--border-subtle);
            background: #020617;
            color: var(--text-main);
            outline: none;
            font-size: 0.9rem;
        }
        input[type="text"]:focus, textarea:focus, select:focus, input[type="number"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 1px rgba(59,130,246,0.9);
        }
        textarea { resize: vertical; min-height: 130px; }
        label { font-size: 0.85rem; color: var(--text-muted); }
        .muted { color: var(--text-muted); font-size: 0.8rem; }

        .badge {
            display: inline-flex;
            padding: 0.2rem 0.55rem;
            border-radius: var(--radius-full);
            border: 1px solid rgba(148,163,184,0.5);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            color: var(--text-muted);
        }

        .error { color: var(--danger); font-size: 0.85rem; margin-top: 0.4rem; }

        /* markdown styling for study_result etc. */
        .markdown-body h1,
        .markdown-body h2,
        .markdown-body h3,
        .markdown-body h4 {
            color: #e5e7eb;
            margin-top: 0.8rem;
            margin-bottom: 0.4rem;
        }

        .markdown-body strong {
            color: #facc15;
        }

        .markdown-body ul,
        .markdown-body ol {
            padding-left: 1.2rem;
            margin: 0.3rem 0 0.6rem;
        }

        .markdown-body code {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            background: rgba(15,23,42,0.9);
            padding: 0.1rem 0.25rem;
            border-radius: 4px;
        }

        .footer {
            padding: 1rem 1.5rem 1.8rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: center;
            border-top: 1px solid rgba(37,99,235,0.6);
            background: radial-gradient(circle at bottom, rgba(250,204,21,0.22), transparent 55%);
        }

        @media (max-width: 840px) {
            .navbar-inner {
                flex-direction: column;
                gap: 0.7rem;
                align-items: flex-start;
            }
        }
    </style>
    {% block head_extra %}{% endblock %}
</head>
<body>
<header class="navbar">
    <div class="navbar-inner">
        <div class="brand">
            <div class="brand-pill">R</div>
            <span>RAG Study Buddy</span>
        </div>
        <nav class="nav-links">
            <a href="{{ url_for('index') }}" class="nav-link {% if active == 'home' %}active{% endif %}">Home / Specs</a>
            <a href="{{ url_for('study_page') }}" class="nav-link {% if active == 'study' %}active{% endif %}">YouTube &amp; Notes</a>
            <a href="{{ url_for('use_example') }}" class="nav-link">Document Q&amp;A</a>
            <a href="{{ url_for('important_questions_page') }}" class="nav-link {% if active == 'important' %}active{% endif %}">Important Qs</a>
            <a href="{{ url_for('history') }}" class="nav-link {% if active == 'history' %}active{% endif %}">History</a>
        </nav>
    </div>
</header>

<main class="page">
    <div class="page-inner">
        {% block content %}{% endblock %}
    </div>
</main>

<footer class="footer">
    RAG Study Buddy · PDFs · Images · YouTube · Question Papers · Multilingual
</footer>

{% block scripts %}{% endblock %}
</body>
</html>
